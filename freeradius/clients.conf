# ============================================================
# RadiusServer – RADIUS Clients
# ============================================================
# Minimal static client config. Production NAS devices are
# managed via the database (read_clients = yes in SQL module).
# ============================================================

# Docker network (common ranges)
client docker_network {
    ipaddr = 172.16.0.0/12
    secret = %%RADIUS_SECRET%%
    shortname = docker
    nastype = other
}
