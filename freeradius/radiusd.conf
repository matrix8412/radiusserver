# ============================================================
# RadiusServer – FreeRADIUS Main Configuration
# ============================================================
# Minimal override of the default radiusd.conf.
# Most defaults are fine; we customize logging, security,
# and ensure SQL integration works correctly.
# ============================================================

prefix = /usr
exec_prefix = /usr
sysconfdir = /etc
localstatedir = /var
sbindir = ${exec_prefix}/sbin
logdir = /var/log/radius
raddbdir = /etc/raddb
radacctdir = ${logdir}/radacct
run_dir = ${localstatedir}/run/radiusd
db_dir = ${raddbdir}

name = radiusd

# Run as radius user
user = radius
group = radius

# Don't daemonize (supervisord handles this)
daemon = no

# Max outstanding requests
max_request_time = 30
cleanup_delay = 5
max_requests = 16384

# Hostname lookups are slow – disable
hostname_lookups = no

# Reject delay (slow down brute-force)
reject_delay = 1

# Logging
log {
    destination = stdout
    colourise = no
    file = ${logdir}/radius.log
    syslog_facility = daemon
    stripped_names = no
    auth = yes
    auth_badpass = yes
    auth_goodpass = no
    msg_denied = "You are already logged in - access denied"
}

# Security hardening
security {
    max_attributes = 200
    reject_delay = 1
    status_server = yes
    allow_core_dumps = no
}

# Thread pool
thread pool {
    start_servers = 5
    max_servers = 32
    min_spare_servers = 3
    max_spare_servers = 10
    max_requests_per_server = 0
    auto_limit_acct = no
}

# Load modules
$INCLUDE ${confdir}/mods-enabled/

# Load policy
$INCLUDE ${confdir}/policy.d/

# Load virtual servers
$INCLUDE ${confdir}/sites-enabled/

# Listen on all interfaces for auth and acct
listen {
    type = auth
    ipaddr = *
    port = 1812
    limit {
        max_connections = 16
        lifetime = 0
        idle_timeout = 30
    }
}

listen {
    type = acct
    ipaddr = *
    port = 1813
    limit {
        max_connections = 16
        lifetime = 0
        idle_timeout = 30
    }
}

# Client definitions
$INCLUDE ${confdir}/clients.conf
